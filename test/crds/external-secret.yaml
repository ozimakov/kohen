# Minimal ExternalSecret CRD for Tier 2 (envtest) tests of Kohen's ESO
# integration. It is NOT the upstream ESO CRD — only enough schema
# for Kohen to apply an ExternalSecret and read its Ready condition and synced
# revision. The real CRD ships with the External Secrets Operator.
#
# Only v1beta1 is served here (upstream serves v1 too); this deliberately
# exercises Kohen's multi-version fallback (v1 → v1beta1) in the resolver and
# prune paths.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: externalsecrets.external-secrets.io
spec:
  group: external-secrets.io
  names:
    kind: ExternalSecret
    listKind: ExternalSecretList
    plural: externalsecrets
    singular: externalsecret
    shortNames:
      - es
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
