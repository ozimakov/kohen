{{- $scope := include "kohen.scope" . -}}
{{- if eq $scope "cluster" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kohen.fullname" . }}
  labels:
    {{- include "kohen.labels" . | nindent 4 }}
rules:
{{ include "kohen.rbacRules" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kohen.fullname" . }}
  labels:
    {{- include "kohen.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kohen.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kohen.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kohen.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kohen.labels" . | nindent 4 }}
rules:
{{ include "kohen.rbacRules" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kohen.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kohen.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kohen.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kohen.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.leaderElection.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kohen.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kohen.labels" . | nindent 4 }}
rules:
{{ include "kohen.leaderElectionRules" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kohen.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kohen.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kohen.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "kohen.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
