---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: configsyncs.kohen.dev
spec:
  group: kohen.dev
  names:
    categories:
    - kohen
    kind: ConfigSync
    listKind: ConfigSyncList
    plural: configsyncs
    shortNames:
    - cs
    singular: configsync
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.sourceCommit
      name: Source-Commit
      type: string
    - jsonPath: .status.configVersion
      name: Config-Version
      type: string
    - jsonPath: .status.workloadVersion
      name: Workload-Version
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ConfigSync keeps a target workload in sync with a path in a git
          config repo.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ConfigSyncSpec defines the desired state of a ConfigSync
              (SPEC §11.1).
            properties:
              configMap:
                description: ConfigMap configures the target ConfigMap.
                properties:
                  name:
                    description: |-
                      Name of the ConfigMap. Defaults to "<workloadRef.name>-config" (SPEC
                      §11.2); the default is applied at reconcile time (see Spec.ConfigMapName).
                    type: string
                type: object
              path:
                description: Path is the repository-relative path whose files are
                  rendered.
                minLength: 1
                type: string
              rollout:
                default: auto
                description: Rollout controls whether config changes trigger a rollout.
                enum:
                - auto
                - none
                type: string
              secretRefs:
                description: SecretRefs declares secrets the config references (Phase
                  2).
                items:
                  description: |-
                    SecretReference declares a secret the config references. The full resolution
                    and surfacing behavior is delivered in Phase 2 (S2.1+); this shape reserves
                    the API field.
                  properties:
                    backend:
                      description: Backend selects the resolution mechanism.
                      enum:
                      - externalSecret
                      - nativeSecret
                      type: string
                    externalSecret:
                      description: ExternalSecret references the ExternalSecret object
                        (backend=externalSecret).
                      properties:
                        name:
                          description: Name of the referenced object.
                          minLength: 1
                          type: string
                      required:
                      - name
                      type: object
                    name:
                      description: Name is the unique local name of this reference.
                      minLength: 1
                      type: string
                    nativeSecret:
                      description: NativeSecret references a native Secret (backend=nativeSecret).
                      properties:
                        name:
                          description: Name of the referenced object.
                          minLength: 1
                          type: string
                      required:
                      - name
                      type: object
                  required:
                  - backend
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              source:
                description: Source is the git repository, ref, and optional credentials.
                properties:
                  authSecretRef:
                    description: |-
                      AuthSecretRef references a Secret (same namespace) holding git credentials.
                      The Secret MUST be labeled kohen.dev/git-credential=true (SPEC R7.8,
                      R-AUTH.6), enforced at reconcile time.
                    properties:
                      name:
                        description: Name of the referenced object.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  ref:
                    default: main
                    description: |-
                      Ref is a branch, tag, or commit SHA. Branch tracking follows the moving
                      branch; tag/commit pins are immutable (SPEC R7.2).
                    type: string
                  url:
                    description: URL is the repository URL over HTTPS or SSH (SPEC
                      R7.1).
                    minLength: 1
                    type: string
                required:
                - url
                type: object
              sync:
                default:
                  interval: 30s
                description: Sync configures reconcile timing.
                properties:
                  interval:
                    default: 30s
                    description: Interval between polling reconciles.
                    type: string
                type: object
              wiring:
                default:
                  mountPath: /etc/kohen/config
                description: Wiring configures how config is mounted into the workload.
                properties:
                  container:
                    description: |-
                      Container to wire. Defaults to the first container of the pod spec (SPEC
                      §11.2), applied at reconcile time.
                    type: string
                  mountPath:
                    default: /etc/kohen/config
                    description: MountPath is the volume mount path for the config.
                    type: string
                type: object
              workloadRef:
                description: WorkloadRef is the target workload (same namespace).
                properties:
                  kind:
                    description: Kind of the workload. Only RollingUpdate-capable
                      kinds are supported.
                    enum:
                    - Deployment
                    - StatefulSet
                    type: string
                  name:
                    description: Name of the workload.
                    minLength: 1
                    type: string
                required:
                - kind
                - name
                type: object
            required:
            - path
            - source
            - workloadRef
            type: object
            x-kubernetes-validations:
            - message: path must be a repository-relative path without '..' segments
              rule: '!self.path.startsWith(''/'') && !self.path.contains(''..'')'
          status:
            description: ConfigSyncStatus is the observed state of a ConfigSync (SPEC
              §11.1, §11.4).
            properties:
              conditions:
                description: Conditions is the standard condition set (SPEC §11.4).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              configVersion:
                description: ConfigVersion is the desired rollout-trigger identity
                  (stamped value).
                type: string
              observedGeneration:
                description: ObservedGeneration is the last spec generation reconciled.
                format: int64
                type: integer
              rolloutInProgress:
                description: RolloutInProgress reflects whether the workload is mid-rollout.
                type: boolean
              secretRefs:
                description: SecretRefs is the per-reference resolution state (no
                  values).
                items:
                  description: |-
                    SecretRefStatus reports per-reference resolution state — never values (SPEC
                    §11.1, R11.2).
                  properties:
                    backend:
                      description: Backend is the reference's backend.
                      enum:
                      - externalSecret
                      - nativeSecret
                      type: string
                    name:
                      description: Name of the reference.
                      type: string
                    reason:
                      description: Reason explains a non-resolved state.
                      type: string
                    resolved:
                      description: Resolved indicates whether the reference is currently
                        resolved.
                      type: boolean
                  required:
                  - name
                  - resolved
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              sourceCommit:
                description: |-
                  SourceCommit is the resolved git commit SHA (plain SHA, correlates with
                  git log).
                type: string
              workloadVersion:
                description: WorkloadVersion is the version currently stamped on the
                  workload.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
