# SemVer release pipeline (PLAN S3.3 / NFR10):
# tag vX.Y.Z → multi-arch image + SBOM + cosign (by digest) + Helm OCI chart +
# pinned manifest bundles + checksums + GitHub Release.
#
# Rehearse packaging without publishing:
#   Actions → Release → Run workflow → version=1.0.0-rc.1, dry_run=true
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer without leading v (e.g. 1.0.0-rc.1)'
        required: true
        type: string
      dry_run:
        description: 'Package only — do not push image/chart or create a GitHub Release'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: meta
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW="${{ inputs.version }}"
            DRY_RUN="${{ inputs.dry_run }}"
          else
            RAW="${GITHUB_REF_NAME}"
            DRY_RUN="false"
          fi
          eval "$(bash scripts/validate-release-tag.sh "${RAW}")"
          {
            echo "version=${version}"
            echo "prerelease=${prerelease}"
            echo "dry_run=${DRY_RUN}"
            echo "commit=$(git rev-parse --short=12 HEAD)"
          } | tee -a "$GITHUB_OUTPUT"
          echo "Resolved version=${version} prerelease=${prerelease} dry_run=${DRY_RUN}"

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Package chart & manifests
        env:
          IMAGE_REPO: ${{ env.IMAGE }}
        run: |
          set -euo pipefail
          bash scripts/package-release.sh "${{ steps.meta.outputs.version }}" dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kohen-${{ steps.meta.outputs.version }}
          path: |
            dist/*.tgz
            dist/manifests/**
            dist/SHA256SUMS
            dist/release-notes.md
          if-no-files-found: error

      # ----- publish path (skipped on dry_run) -----

      - uses: docker/setup-qemu-action@v3
        if: steps.meta.outputs.dry_run != 'true'

      - uses: docker/setup-buildx-action@v3
        if: steps.meta.outputs.dry_run != 'true'

      - uses: docker/login-action@v3
        if: steps.meta.outputs.dry_run != 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: docker_meta
        if: steps.meta.outputs.dry_run != 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.version }}
            type=raw,value=latest,enable=${{ steps.meta.outputs.prerelease != 'true' }}

      - name: Build & push operator image
        id: build
        if: steps.meta.outputs.dry_run != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push Helm chart (OCI)
        if: steps.meta.outputs.dry_run != 'true'
        run: |
          set -euo pipefail
          helm push "dist/kohen-${{ steps.meta.outputs.version }}.tgz" \
            "oci://${{ env.IMAGE }}/charts"

      - name: Install cosign
        if: steps.meta.outputs.dry_run != 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, by digest)
        if: steps.meta.outputs.dry_run != 'true'
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          DIGEST="${{ steps.build.outputs.digest }}"
          if [[ -z "${DIGEST}" ]]; then
            echo "error: build-push-action did not emit an image digest" >&2
            exit 1
          fi
          cosign sign --yes "${{ env.IMAGE }}@${DIGEST}"

      - name: Sign Helm chart (keyless)
        if: steps.meta.outputs.dry_run != 'true'
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cosign sign --yes "${{ env.IMAGE }}/charts/kohen:${{ steps.meta.outputs.version }}"

      - name: Create GitHub Release
        if: steps.meta.outputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: v${{ steps.meta.outputs.version }}
          body_path: dist/release-notes.md
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist/*.tgz
            dist/manifests/kohen.yaml
            dist/manifests/kohen-namespaced.yaml
            dist/SHA256SUMS
