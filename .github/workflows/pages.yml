# Publish the project site (site/) to the gh-pages branch.
#
# One-time repo setup (Settings → Pages):
#   Source: Deploy from a branch
#   Branch: gh-pages / (root)
#
# The official actions/deploy-pages flow requires Pages to already be enabled
# with "GitHub Actions" as the source; GITHUB_TOKEN cannot enable that. Branch
# publishing keeps this workflow green and updates the site once Pages is
# pointed at gh-pages.
name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Publish site/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'Deploy site'
