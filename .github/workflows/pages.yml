# Publish the project site (site/) from main via GitHub Pages (Actions).
#
# Custom domain: kohen.zimakov.net (see site/CNAME).
#
# One-time repo setup (Settings → Pages):
#   Source: GitHub Actions
#   Custom domain: kohen.zimakov.net (also set by the CNAME in the artifact)
#   Enforce HTTPS: enable after DNS verifies
#
# DNS (managed outside this repo): CNAME kohen → ozimakov.github.io
#
# The site source lives on main under site/. This workflow uploads that
# directory and deploys it with actions/deploy-pages — no gh-pages branch.
name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy site/
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
